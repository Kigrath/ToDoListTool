<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDoListTool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="background-orb background-orb-left"></div>
    <div class="background-orb background-orb-right"></div>

    <main class="shell">
      <section class="hero card">
        <div>
          <p class="eyebrow">Local Task System</p>
          <h1>ToDoListTool</h1>
          <p class="lede">Erstelle Tasks und Subtasks, setze Fälligkeiten, Prioritäten und Status, und speichere alles dauerhaft in einer JSON-Datei.</p>
        </div>
        <div class="stats" id="stats"></div>
      </section>

      <section class="card form-card">
        <form id="task-form" class="task-form">
          <div class="grid two-up">
            <label>
              Titel
              <input name="title" type="text" placeholder="Neuen Task eingeben" required />
            </label>
            <label>
              Fällig am
              <input name="dueDate" type="date" />
            </label>
          </div>
          <label>
            Beschreibung
            <textarea name="description" rows="3" placeholder="Kurze Notiz oder Kontext"></textarea>
          </label>
          <div class="grid three-up">
            <label>
              Priorität
              <select name="priority">
                <option value="low">Niedrig</option>
                <option value="medium" selected>Mittel</option>
                <option value="high">Hoch</option>
              </select>
            </label>
            <label>
              Status
              <select name="status">
                <option value="todo">To do</option>
                <option value="in-progress">In progress</option>
                <option value="done">Done</option>
              </select>
            </label>
            <label>
              Subtasks
              <input name="subtasks" type="text" placeholder="Mit Komma trennen" />
            </label>
          </div>
          <button type="submit">Task anlegen</button>
        </form>
        <div class="utility-bar">
          <button type="button" id="export-json" class="secondary">Export JSON</button>
          <button type="button" id="import-json" class="secondary">Import JSON</button>
          <input id="import-file" type="file" accept="application/json,.json" class="hidden" />
        </div>
      </section>

      <section class="card filter-card">
        <div class="filter-row">
          <label>
            Suche
            <input id="filter-query" type="search" placeholder="Titel, Beschreibung oder Subtask" />
          </label>
          <label>
            Status
            <select id="filter-status">
              <option value="all">Alle</option>
              <option value="todo">To do</option>
              <option value="in-progress">In progress</option>
              <option value="done">Done</option>
            </select>
          </label>
          <label>
            Priorität
            <select id="filter-priority">
              <option value="all">Alle</option>
              <option value="low">Niedrig</option>
              <option value="medium">Mittel</option>
              <option value="high">Hoch</option>
            </select>
          </label>
          <button type="button" id="clear-filters" class="ghost">Filter löschen</button>
        </div>
      </section>

      <section class="card list-card">
        <div class="section-head">
          <div>
            <p class="eyebrow">Übersicht</p>
            <h2>Aktive Tasks</h2>
          </div>
          <p id="empty-state" class="empty-state hidden">Noch keine Tasks vorhanden.</p>
        </div>
        <div id="task-list" class="task-list"></div>
      </section>
    </main>

    <template id="task-template">
      <article class="task-item">
        <div class="task-item-head">
          <div>
            <h3 class="task-title"></h3>
            <p class="task-meta"></p>
          </div>
          <div class="task-actions">
            <button class="secondary edit-task">Bearbeiten</button>
            <button class="secondary toggle-task"></button>
            <button class="ghost delete-task">Löschen</button>
          </div>
        </div>
        <p class="task-description"></p>
        <form class="task-edit-form hidden">
          <div class="grid two-up">
            <label>
              Titel
              <input name="title" type="text" required />
            </label>
            <label>
              Fällig am
              <input name="dueDate" type="date" />
            </label>
          </div>
          <label>
            Beschreibung
            <textarea name="description" rows="3"></textarea>
          </label>
          <div class="grid two-up">
            <label>
              Priorität
              <select name="priority">
                <option value="low">Niedrig</option>
                <option value="medium">Mittel</option>
                <option value="high">Hoch</option>
              </select>
            </label>
            <label>
              Status
              <select name="status">
                <option value="todo">To do</option>
                <option value="in-progress">In progress</option>
                <option value="done">Done</option>
              </select>
            </label>
          </div>
          <div class="edit-actions">
            <button type="submit">Speichern</button>
            <button type="button" class="ghost cancel-edit">Abbrechen</button>
          </div>
        </form>
        <div class="subtask-block">
          <div class="subtask-head">
            <h4>Subtasks</h4>
            <button class="ghost add-subtask-trigger">+ Subtask</button>
          </div>
          <form class="subtask-form hidden">
            <input type="text" name="subtaskTitle" placeholder="Neuen Subtask eingeben" />
            <button type="submit">Hinzufügen</button>
          </form>
          <div class="subtask-list"></div>
        </div>
      </article>
    </template>

    <template id="subtask-template">
      <div class="subtask-item" draggable="true">
        <label class="subtask-check">
          <input type="checkbox" class="subtask-toggle" />
          <span class="subtask-name"></span>
        </label>
        <button class="ghost delete-subtask">Entfernen</button>
      </div>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
